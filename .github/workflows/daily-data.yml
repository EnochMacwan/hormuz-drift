name: Daily data refresh

# Refreshes data/currents.json with the latest CMEMS currents + GFS winds.
# Runs every day at 06:00 UTC and on manual dispatch.

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install copernicusmarine xarray numpy netCDF4 pydap

      - name: Fetch CMEMS + GFS
        env:
          CMEMS_USER: ${{ secrets.CMEMS_USER }}
          CMEMS_PASS: ${{ secrets.CMEMS_PASS }}
        run: python scripts/fetch_data.py

      - name: Commit and push
        run: |
          git config user.email "actions@github.com"
          git config user.name  "data-bot"
          git add data/currents.json
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "data: daily refresh $(date -u +%F)"
          git push
